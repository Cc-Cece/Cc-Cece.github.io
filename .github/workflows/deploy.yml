name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      content:
        description: "Optional spark content"
        required: false
        type: string
      ttl:
        description: "Spark lifetime, e.g. 7d, 30d, never"
        required: false
        default: "30d"
        type: string
      expires:
        description: "Optional absolute expiration date"
        required: false
        type: string
      timezone:
        description: "Timezone offset for generated dates"
        required: false
        default: "+08:00"
        type: string
      secret:
        description: "Optional spark shared secret"
        required: false
        type: string
      joke:
        description: "Optional joke setup"
        required: false
        type: string
      reveal:
        description: "Optional joke punchline"
        required: false
        type: string
      joke_secret:
        description: "Optional joke shared secret"
        required: false
        type: string
  repository_dispatch:
    types: ["new-spark", "new-joke"]
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create spark
        if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.content != '')
        env:
          SPARK_SECRET: ${{ secrets.SPARK_SECRET }}
        run: node scripts/create-spark.cjs

      - name: Commit spark
        if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.content != '')
        run: |
          if [ -n "$(git status --porcelain src/sparks)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/sparks
            git commit -m "Add spark"
            git push
          fi

      - name: Create joke
        if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.joke != '')
        env:
          JOKE_SECRET: ${{ secrets.JOKE_SECRET }}
        run: node scripts/create-joke.cjs

      - name: Commit joke
        if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.joke != '')
        run: |
          if [ -n "$(git status --porcelain src/jokes)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/jokes
            git commit -m "Add joke"
            git push
          fi

      - name: Build
        env:
          PATH_PREFIX: ${{ vars.PAGE_PATH_PREFIX }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
