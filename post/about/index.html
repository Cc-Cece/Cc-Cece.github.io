<script>

hljs.initHighlightingOnLoad();

window.addEventListener('load', function () {
    Lightense('#post .mdui-card-content img');

    const tocContainer = document.querySelector('.toc-container');
    if (tocContainer) {
        tocContainer.querySelectorAll('a').forEach(link => link.removeAttribute('target'));
    }

    const postContent = document.getElementById('post-content');
    const headings = postContent ? postContent.querySelectorAll('h1,h2,h3,h4,h5,h6') : [];
    const tocLinks = tocContainer ? tocContainer.querySelectorAll('a') : [];

    function highlightTocLink() {
        let current = null;
        const viewportHeight = window.innerHeight;
        for (let i = 0; i < headings.length; i++) {
            const rect = headings[i].getBoundingClientRect();
            if (rect.top >= 0 && rect.top <= viewportHeight * 0.5) {
                current = headings[i];
            }
        }
        if (!current) return;

        const id = current.id;
        tocLinks.forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
        });

        const activeLink = Array.from(tocLinks).find(link => link.classList.contains('active'));
        if (activeLink && tocContainer) {
            const linkRect = activeLink.getBoundingClientRect();
            const containerRect = tocContainer.getBoundingClientRect();
            if (linkRect.top < containerRect.top || linkRect.bottom > containerRect.bottom) {
                tocContainer.scrollTop += linkRect.top - containerRect.top - containerRect.height / 2 + linkRect.height / 2;
            }
        }
    }

    highlightTocLink();
    window.addEventListener('scroll', highlightTocLink);
});
const commentArea = document.getElementById('disqus_thread');
const tocBox = document.querySelector('.toc-container');

if (commentArea && tocBox) {
  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          tocBox.style.display = 'none';
        } else {
          tocBox.style.display = '';
        }
      });
    },
    { root: null, threshold: 0.8} 
  );
  observer.observe(commentArea);
}
</script>
